version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wtd_db
      MYSQL_USER: wtd_user
      MYSQL_PASSWORD: wtd_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  core-service:
    build:
      context: .
      args:
        SERVICE_NAME: core
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: wtd_password
      MYSQL_USER: wtd_user
      MYSQL_DATABASE: wtd_db
    depends_on:
      mysql:
        condition: service_healthy

  utils-service:
    build:
      context: .
      args:
        SERVICE_NAME: utils
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      CORE_SERVICE_URL: http://core-service:3000
    depends_on:
      - core-service
